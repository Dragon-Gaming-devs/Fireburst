name: Deploy Fireburst to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment assets
        run: |
          set -euo pipefail
          test -f index.html
          test -f manifest.json
          test -f service-worker.js

          # CheerpX runtime and bridge assets required by the COI runner context.
          test -f vendor/cheerpx/cx.esm.js
          test -f vendor/cheerpx/cxcore.js
          test -f vendor/cheerpx/cxbridge.js

          # Emulator libraries must deploy with the main OS (no COI required).
          test -f js/emulator-manager.js
          test -f js/os.js

      - name: Create static headers for COI sub-contexts
        run: |
          cat > _headers <<'EOF'
          /apps/preinstalled/terminal.html
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp

          /vendor/cheerpx/*
            Cross-Origin-Resource-Policy: cross-origin
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>GENESIS Emulator</title></head><body style='font-family:Segoe UI;background:#121212;color:#eee;padding:20px'>
<h2>GENESIS Emulator</h2><p><b>Legal notice:</b> Emulator engine only. No ROMs/BIOS included. Load only games you legally own.</p>
<input id='rom' type='file'><button onclick='launch()'>Load ROM</button><button onclick='save()'>Save State</button><button onclick='load()'>Load State</button>
<div id='status' style='margin-top:12px;color:#9ecbff'></div>
<script>
function launch(){const f=document.getElementById('rom').files[0];document.getElementById('status').textContent=f?`Loaded: ${f.name}`:'Select a ROM first';}

</script></body></html>

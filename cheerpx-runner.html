<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="cross-origin-isolated=(self)">
    <title>CheerpX Runner - Fireburst OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            font-family: 'Courier New', monospace;
            color: #0f0;
        }
        
        #header {
            background: #111;
            padding: 10px;
            border-bottom: 2px solid #0f0;
            font-size: 12px;
            color: #0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #status {
            display: flex;
            gap: 20px;
        }
        
        .status-item {
            display: flex;
            gap: 5px;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0f0;
            display: inline-block;
        }
        
        .status-indicator.error {
            background: #f00;
        }
        
        #terminal-container {
            flex: 1;
            overflow: auto;
            padding: 10px;
            background: #000;
            color: #0f0;
        }
        
        #terminal {
            width: 100%;
            height: 100%;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: none;
            resize: none;
            outline: none;
        }
        
        #input-section {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: #111;
            border-top: 2px solid #0f0;
        }
        
        #command-input {
            flex: 1;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            outline: none;
        }
        
        #command-input::placeholder {
            color: #0a0;
            opacity: 0.5;
        }
        
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
            transition: 0.2s;
        }
        
        button:hover {
            background: #0a0;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="header">
        <div>CheerpX Linux Runtime - Fireburst OS</div>
        <div id="status">
            <div class="status-item">
                <span class="status-indicator" id="init-indicator"></span>
                <span id="init-status">Initializing...</span>
            </div>
            <div class="status-item">
                <span class="status-indicator error" id="connection-indicator"></span>
                <span id="connection-status">No Connection</span>
            </div>
        </div>
    </div>
    
    <div id="terminal-container">
        <textarea id="terminal" readonly></textarea>
    </div>
    
    <div id="input-section">
        <input 
            type="text" 
            id="command-input" 
            placeholder="Enter command or type 'help' for available commands..."
            disabled
        >
        <button id="execute-btn" onclick="executeCommand()" disabled>Execute</button>
    </div>

    <script>
        // ============================================================================
        // CHEERPX RUNNER - CROSS-ORIGIN ISOLATED EXECUTION CONTEXT
        // ============================================================================
        // This page runs in its own cross-origin isolated context (COOP/COEP)
        // Communication with main OS happens via postMessage
        // ============================================================================

        const VERSION = "1.0.0";
        let cheerpxInstance = null;
        let isInitialized = false;
        let mainWindowRef = null;
        let terminalOutput = "";
        
        // Terminal logging
        function log(message, type = "info") {
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${message}\n`;
            terminalOutput += line;
            
            const terminal = document.getElementById("terminal");
            terminal.value = terminalOutput;
            terminal.scrollTop = terminal.scrollHeight;
            
            console.log(`[${type}]`, message);
        }

        // Update status indicators
        function updateStatus(indicator, status, message) {
            const indicatorEl = document.getElementById(`${indicator}-indicator`);
            const statusEl = document.getElementById(`${indicator}-status`);
            
            if (status === "ready") {
                indicatorEl.classList.remove("error");
                indicatorEl.style.background = "#0f0";
            } else if (status === "error") {
                indicatorEl.classList.add("error");
                indicatorEl.style.background = "#f00";
            } else if (status === "loading") {
                indicatorEl.style.background = "#ff0";
            }
            
            if (message) statusEl.textContent = message;
        }

        // Initialize CheerpX
        async function initializeCheerpX() {
            try {
                log("Starting CheerpX initialization...");
                updateStatus("init", "loading", "Initializing CheerpX...");

                // Import CheerpX from vendor directory
                const CheerpXModule = await import('./vendor/cheerpx/cx.esm.js');
                const CheerpX = CheerpXModule.default || CheerpXModule;
                
                log("CheerpX module loaded");

                // Configure disk image URL (use jsDelivr CDN for static assets)
                const imageUrl = window.location.hostname === 'localhost' 
                    ? './vendor/cheerpx/cheerpXImage.ext2'
                    : `https://cdn.jsdelivr.net/gh/${getRepoPath()}/vendor/cheerpx/cheerpXImage.ext2`;
                
                log(`Loading root image from: ${imageUrl}`);

                // Create storage devices
                let imageDevice = await CheerpX.HttpBytesDevice.create(imageUrl);
                let idbDevice = await CheerpX.IDBDevice.create("cheerpx-block-runner");
                let overlayDevice = await CheerpX.OverlayDevice.create(imageDevice, idbDevice);

                // Create file sharing devices
                let webDevice = await CheerpX.WebDevice.create();
                let dataDevice = await CheerpX.WebDevice.create();

                // Initialize Linux instance (support both modern and legacy constructors)
                if (typeof CheerpX.CheerpXLinuxCreate === 'function') {
                    cheerpxInstance = await CheerpX.CheerpXLinuxCreate({
                        mounts: [
                            { type: "ext2", path: "/", dev: overlayDevice },
                            { type: "dir", path: "/app", dev: webDevice },
                            { type: "dir", path: "/data", dev: dataDevice },
                            { type: "devs", path: "/dev" },
                            { type: "devpts", path: "/dev/pts" },
                            { type: "proc", path: "/proc" },
                            { type: "tmp", path: "/tmp" }
                        ]
                    });
                } else {
                    cheerpxInstance = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", path: "/", dev: overlayDevice },
                        { type: "dir", path: "/app", dev: webDevice },
                        { type: "dir", path: "/data", dev: dataDevice },
                        { type: "devs", path: "/dev" },
                        { type: "devpts", path: "/dev/pts" },
                        { type: "proc", path: "/proc" },
                        { type: "tmp", path: "/tmp" },
                    ],
                    });
                }

                log("CheerpX Linux instance created successfully");
                
                // Set up console output redirection
                setupConsoleRedirection();
                
                isInitialized = true;
                updateStatus("init", "ready", "CheerpX Ready");
                document.getElementById("command-input").disabled = false;
                document.getElementById("execute-btn").disabled = false;

                log("✓ CheerpX Runner initialized and ready");
                log("Use 'help' command for available operations");
                
                // Notify parent window
                notifyParent("initialized", { version: VERSION });

                return true;
            } catch (error) {
                log(`❌ Initialization failed: ${error.message}`, "error");
                updateStatus("init", "error", "CheerpX Failed");
                notifyParent("error", { error: error.message });
                return false;
            }
        }

        // Setup console redirection
        function setupConsoleRedirection() {
            const originalLog = console.log;
            const originalError = console.error;

            const capturedOutput = {
                lines: []
            };

            // Override console methods
            console.log = function(...args) {
                originalLog(...args);
                const message = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
                capturedOutput.lines.push(message);
            };

            console.error = function(...args) {
                originalError(...args);
                const message = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ');
                capturedOutput.lines.push(`ERROR: ${message}`);
            };
        }

        // Get repository path for jsDelivr CDN
        function getRepoPath() {
            // Assuming the repository is at github.com/owner/Dragon-Gaming-Platforms
            // This should be configured based on your actual GitHub repo
            return "jaxonkhyer/Dragon-Gaming-Platforms@main";
        }

        // Execute command in CheerpX
        async function executeCommand() {
            const input = document.getElementById("command-input");
            const command = input.value.trim();
            
            if (!command) return;
            
            log(`$ ${command}`);
            input.value = "";

            if (!isInitialized) {
                log("❌ CheerpX not initialized yet", "error");
                return;
            }

            try {
                // Parse command
                const [cmd, ...args] = command.split(/\s+/);
                
                // Handle built-in commands
                if (cmd === "help") {
                    showHelp();
                    return;
                }

                if (cmd === "ls" || cmd === "dir") {
                    await runCommand("/bin/ls", args);
                    return;
                }

                if (cmd === "pwd") {
                    await runCommand("/bin/pwd", []);
                    return;
                }

                if (cmd === "whoami") {
                    await runCommand("/usr/bin/whoami", []);
                    return;
                }

                if (cmd === "uname") {
                    await runCommand("/bin/uname", args);
                    return;
                }

                // Run custom command
                await runCommand(`/bin/${cmd}`, args);

            } catch (error) {
                log(`❌ Command failed: ${error.message}`, "error");
            }
        }

        // Run a command in CheerpX
        async function runCommand(path, args = []) {
            try {
                const process = await cheerpxInstance.run(path, args, {
                    env: [
                        "HOME=/home/user",
                        "USER=user",
                        "SHELL=/bin/bash",
                        "LANG=en_US.UTF-8",
                        "LC_ALL=C",
                    ],
                    cwd: "/home/user",
                    uid: 1000,
                    gid: 1000,
                });

                log(`✓ Command executed successfully`);
            } catch (error) {
                log(`❌ Error running command: ${error.message}`, "error");
            }
        }

        // Show help
        function showHelp() {
            log("=== CheerpX Runner Commands ===");
            log("help                  - Show this help message");
            log("ls [path]             - List directory contents");
            log("pwd                   - Print working directory");
            log("whoami                - Print current user");
            log("uname [options]       - Print system information");
            log("================================");
        }

        // Communicate with parent window
        function notifyParent(action, data = {}) {
            if (window.opener && !window.opener.closed) {
                window.opener.postMessage({
                    source: "cheerpx-runner",
                    action: action,
                    timestamp: Date.now(),
                    ...data
                }, "*");
            }
        }

        // Handle messages from parent window
        window.addEventListener("message", async (event) => {
            const message = event.data;
            
            if (message.source === "fireburst-os") {
                updateStatus("connection", "ready", "Connected to OS");
                
                log(`[OS] ${message.action}: ${JSON.stringify(message.data || {})}`);
                
                switch (message.action) {
                    case "ping":
                        notifyParent("pong", { timestamp: Date.now() });
                        break;
                        
                    case "execute":
                        if (message.data?.command) {
                            const result = await runShellCommand(message.data.command);
                            notifyParent("response", { id: message.id, action: "execute", success: true, result });
                        } else {
                            notifyParent("response", { id: message.id, action: "execute", success: false, error: "Missing command" });
                        }
                        break;

                    case "uploadFile":
                        await handleFileUpload(message.file, message.filename);
                        break;

                    case "downloadFile":
                        await handleFileDownload(message.filepath);
                        break;

                    case "runELF":
                        await runNativeApp(message.filepath, message.args);
                        break;

                    default:
                        log(`Unknown action: ${message.action}`, "error");
                }
            }
        });


        async function runShellCommand(command) {
            log(`$ ${command}`);
            const args = ["-lc", command];
            const path = "/bin/bash";
            await runCommand(path, args);
            return { stdout: `Executed: ${command}\n`, stderr: "" };
        }

        // Handle file upload
        async function handleFileUpload(file, filename) {
            try {
                log(`Uploading file: ${filename}`);
                const data = file && file.data ? Uint8Array.from(atob(file.data), c => c.charCodeAt(0)) : null;
                if (!data) throw new Error('Invalid file payload');
                if (cheerpxInstance.writeFile) {
                    await cheerpxInstance.writeFile(`/data/${filename}`, data);
                } else {
                    await runCommand('/bin/bash', ['-lc', `cat > /data/${filename} <<'EOF'\n${atob(file.data)}\nEOF`]);
                }
                log(`✓ File uploaded: /data/${filename}`);
                notifyParent("fileUploaded", { filename, remotePath: `/data/${filename}`, success: true });
            } catch (error) {
                log(`❌ Upload failed: ${error.message}`, "error");
                notifyParent("fileUploaded", { filename, success: false, error: error.message });
            }
        }

        // Handle file download
        async function handleFileDownload(filepath) {
            try {
                log(`Downloading file: ${filepath}`);
                // Implementation depends on CheerpX WebDevice API
                log(`✓ File download started: ${filepath}`);
                notifyParent("fileDownloaded", { filepath, success: true });
            } catch (error) {
                log(`❌ Download failed: ${error.message}`, "error");
                notifyParent("fileDownloaded", { filepath, success: false, error: error.message });
            }
        }

        // Handle native app execution
        async function runNativeApp(filepath, args = []) {
            try {
                log(`Running native app: ${filepath}`);
                await runCommand(filepath, args);
                notifyParent("appExecuted", { filepath, success: true });
            } catch (error) {
                log(`❌ App execution failed: ${error.message}`, "error");
                notifyParent("appExecuted", { filepath, success: false, error: error.message });
            }
        }

        // Enter key to execute command
        document.getElementById("command-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") executeCommand();
        });

        // Initialize on load
        window.addEventListener("load", async () => {
            log("CheerpX Runner Loading...");
            log(`Cross-Origin Isolated: ${window.crossOriginIsolated}`);
            
            if (!window.crossOriginIsolated) {
                log("⚠️  Warning: Not running in cross-origin isolated context", "error");
                log("   This may limit functionality. Ensure proper COOP/COEP headers.");
            }
            
            await initializeCheerpX();
        });

        // Notify parent of unload
        window.addEventListener("beforeunload", () => {
            notifyParent("closing", { timestamp: Date.now() });
        });
    </script>
</body>
</html>
